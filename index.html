<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>OneToTen — Personal Media Reviews</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="#/" class="logo">🎯 OneToTen</a>
            <div class="header-actions">
                <button class="btn btn-primary" id="addReviewBtn" style="display:none">+ Add Review</button>
                <button class="btn btn-secondary btn-sm" id="authBtn">Login</button>
            </div>
        </div>
        <nav class="nav-tabs" id="navTabs">
            <a href="#/all" class="nav-tab active" data-type="all">All</a>
            <a href="#/movies" class="nav-tab" data-type="movie">🎬 Movies</a>
            <a href="#/tvshows" class="nav-tab" data-type="tvshow">📺 TV Shows</a>
            <a href="#/videogames" class="nav-tab" data-type="videogame">🎮 Games</a>
            <a href="#/boardgames" class="nav-tab" data-type="boardgame">🎲 Board Games</a>
            <a href="#/books" class="nav-tab" data-type="book">📚 Books</a>
        </nav>
    </header>

    <main class="main" id="mainContent">
        <!-- Dynamic content rendered here -->
    </main>

    <!-- Add/Edit Review Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="reviewModal">
            <div class="modal-header">
                <h2 id="modalTitle">Add Review</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <form id="reviewForm" class="review-form">
                <input type="hidden" id="reviewId">

                <div class="form-row">
                    <div class="form-group">
                        <label for="reviewType">Type</label>
                        <select id="reviewType" required>
                            <option value="">Select type...</option>
                            <option value="movie">🎬 Movie</option>
                            <option value="tvshow">📺 TV Show</option>
                            <option value="videogame">🎮 Video Game</option>
                            <option value="boardgame">🎲 Board Game</option>
                            <option value="book">📚 Book</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="reviewStatus">Status</label>
                        <select id="reviewStatus" required>
                            <option value="completed">Completed</option>
                            <option value="in-progress">In Progress</option>
                            <option value="dropped">Dropped</option>
                            <option value="avoid">Avoid</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reviewTitle">Title</label>
                    <input type="text" id="reviewTitle" required placeholder="Enter title...">
                </div>

                <div class="form-group">
                    <label for="reviewScore">Score (0–10)</label>
                    <div class="score-input-wrapper">
                        <input type="range" id="reviewScore" min="0" max="10" value="5">
                        <span class="score-display" id="scoreDisplay">5</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reviewLang">Review Language</label>
                    <select id="reviewLang">
                        <option value="en">English</option>
                        <option value="fa">فارسی</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="reviewText">Review</label>
                    <textarea id="reviewText" rows="5" placeholder="Write your review..."></textarea>
                </div>

                <!-- Type-specific fields injected here -->
                <div id="typeSpecificFields"></div>

                <div class="form-group">
                    <label>External Links</label>
                    <div id="externalLinksContainer"></div>
                    <button type="button" class="btn btn-secondary btn-sm" id="addLinkBtn">+ Add Link</button>
                </div>

                <div class="form-group">
                    <label for="imageUrl">Cover Image URL (optional)</label>
                    <input type="url" id="imageUrl" placeholder="https://...">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dateConsumed">Date Consumed</label>
                        <input type="date" id="dateConsumed">
                    </div>
                    <div class="form-group">
                        <label for="reviewTags">Tags (comma-separated)</label>
                        <input type="text" id="reviewTags" placeholder="sci-fi, thriller, co-op">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Review</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginOverlay">
        <div class="modal" style="max-width: 380px;">
            <div class="modal-header">
                <h2>Login</h2>
                <button class="modal-close" onclick="hideLoginModal()">&times;</button>
            </div>
            <form class="review-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required placeholder="Password">
                </div>
                <div class="login-error" id="loginError"></div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Login</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bulk Modify Modal -->
    <div class="modal-overlay" id="bulkModifyOverlay">
        <div class="modal" style="max-width: 420px;">
            <div class="modal-header">
                <h2>Bulk Modify (<span id="bulkModifyCount">0</span> items)</h2>
                <button class="modal-close" onclick="hideBulkModifyModal()">&times;</button>
            </div>
            <div class="review-form">
                <div class="form-group">
                    <label for="bulkField">Field to change</label>
                    <select id="bulkField">
                        <option value="">Select field...</option>
                        <option value="score">Score</option>
                        <option value="status">Status</option>
                        <option value="tags">Tags (comma-separated)</option>
                        <optgroup label="Meta fields">
                            <option value="developer">Developer</option>
                            <option value="director">Director</option>
                            <option value="actors">Actors</option>
                            <option value="platform">Platform</option>
                            <option value="year">Year</option>
                            <option value="network">Network</option>
                            <option value="studio">Studio</option>
                            <option value="author">Author</option>
                            <option value="designer">Designer</option>
                        </optgroup>
                    </select>
                </div>
                <div class="form-group">
                    <label for="bulkValue">New value</label>
                    <input type="text" id="bulkValue" placeholder="Enter value to apply to all selected...">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="hideBulkModifyModal()">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="applyBulkModify()">Apply to All</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
